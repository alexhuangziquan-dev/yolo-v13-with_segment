# =============================================================
# YOLOv11-seg 行人与车辆检测 训练配置
# =============================================================

# --- 基础配置 ---
model: yolo11n-seg.pt       # 预训练权重：yolo11n-seg / yolo11s-seg / yolo11m-seg / yolo11l-seg / yolo11x-seg
data: D:/yolo-v11-seg/data/pedestrian_vehicle/dataset.yaml
project: D:/yolo-v11-seg/runs/train
name: ped_vehicle_seg       # 实验名称，结果保存到 project/name/

# --- 训练超参数 ---
epochs: 100                 # 训练轮数
patience: 20                # 早停等待轮数
batch: 128                   # 批大小（显存不足时改为 8 或 4）
imgsz: 640                  # 输入图像尺寸
device: 0                   # GPU 编号，使用 CPU 改为 'cpu'
workers: 8                  # 数据加载线程数（Windows 建议 4-8）

# --- 优化器 ---
optimizer: AdamW            # SGD / Adam / AdamW / auto
lr0: 0.01                   # 初始学习率
lrf: 0.01                   # 最终学习率 = lr0 * lrf
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1

# --- 数据增强 ---
hsv_h: 0.015                # 色调增强
hsv_s: 0.7                  # 饱和度增强
hsv_v: 0.4                  # 亮度增强
degrees: 0.0                # 旋转角度
translate: 0.1              # 平移
scale: 0.5                  # 缩放
shear: 0.0                  # 错切
perspective: 0.0            # 透视变换
flipud: 0.0                 # 上下翻转
fliplr: 0.5                 # 左右翻转
mosaic: 1.0                 # Mosaic 增强
mixup: 0.0                  # MixUp 增强
copy_paste: 0.1             # Copy-Paste（分割任务推荐开启）

# --- 损失权重 ---
box: 7.5                    # 边框损失
cls: 0.5                    # 分类损失
dfl: 1.5                    # 分布焦点损失
pose: 12.0                  # 关键点损失（分割任务不用）

# --- 保存与日志 ---
save: true
save_period: 10             # 每 N 轮保存一次检查点（-1 仅保存最优）
val: true                   # 训练期间进行验证
plots: true                 # 保存训练曲线图
